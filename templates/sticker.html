<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{CSS_PATH}}">
</head>
<body>
  <div class="sticker">
    <div class="main-row">
      <div class="qr-wrap">
        <img src="{{qrUrl}}" alt="QR" />
      </div>
      <div class="body">
        <div class="codigo-top">{{actRecNro}}</div>
        <div class="numero-principal">{{ArtCod}}</div>
        <div class="numero-secundario">{{ActRecUni}}</div>
        <div class="date-block">
          <span class="date-label">Exp:</span>
          <span class="date-value expiry">{{ActRecLotFec}}</span>
        </div>
        <div class="date-block">
          <span class="date-label-2">Date:</span>
          <span class="date-value">{{ActRecFec}}</span>
        </div>
      </div>
    </div>
    <div class="product-band">
      <div class="product-name">{{ArtNom}}</div>
    </div>
  </div>
</body>
</html>
